function closeSettings(){document.getElementById('settings').classList.add('hidden');}
function saveNames(){const j=(document.getElementById('snJo').value||'').trim(),r=(document.getElementById('snRa').value||'').trim();if(j)store.set('name:jo',j);if(r)store.set('name:ra',r);refreshNames();renderActive();renderSettings();toast('Nimet tallennettu');}
function setMyProfile(p){store.set('myProfile',p);setPerson(p);renderSettings();toast('Tämä laite avautuu nyt profiilille '+nm(p));}
function setSex(p,v){store.set('sex:'+p,v);renderSettings();renderActive();}
function setAge(p,v){const n=parseInt(v);store.set('age:'+p,isNaN(n)?'':n);renderActive();}
function setHeight(p,v){const n=parseInt(v);store.set('height:'+p,isNaN(n)?'':n);renderActive();}
function sexOf(p){return store.get('sex:'+p,'');}
function ageOf(p){return store.get('age:'+p,'');}
function heightOf(p){return store.get('height:'+p,'');}
function waistLimit(p){const s=sexOf(p);return s==='f'?80:s==='m'?94:null;}
function whrLimit(p){const s=sexOf(p);return s==='f'?0.85:s==='m'?0.90:null;}
function weeklyActiveMin(){return store.get('workouts:'+state.person,[]).filter(x=>x.type==='lenkki'&&within(x.d,7)).reduce((a,x)=>a+(x.min||0),0);}
function currentWHR(p){const lh=store.get('lantio:'+p,[]),vh=store.get('vyotaro:'+p,[]),vMap={};vh.forEach(x=>vMap[x.d]=x.w);for(let i=lh.length-1;i>=0;i--){if(vMap[lh[i].d]!=null&&lh[i].w>0)return vMap[lh[i].d]/lh[i].w;}return null;}
function healthCard(){const p=state.person,s=sexOf(p),age=ageOf(p),hgt=heightOf(p);
  let h='<h2 class="sec">Terveysmittarit</h2>';
  if(!s&&!age&&!hgt){h+='<div class="card"><div class="amt" style="line-height:1.45">Aseta sukupuoli, ikä ja pituus asetuksista (⚙️), niin näet henkilökohtaiset terveysviitteet ja kannustavat vertailut. 💜</div></div>';return h;}
  h+='<div class="card">';
  const lv=latestVal('vyotaro'),lw=latestVal('paino'),wl=waistLimit(p);
  if(wl&&lv!=null){const ok=lv<=wl;h+=`<div class="hrow"><span>Vyötärö</span><span class="hval ${ok?'good':'warn'}">${String(lv).replace('.',',')} cm ${ok?'✅':'↑'}</span></div><div class="hsub">Terveellinen alle ${wl} cm${ok?' — hienoa, olet suosituksen alapuolella!':' — pienikin lasku pienentää riskiä.'}</div>`;}
  if(hgt&&lv!=null){const whtr=lv/hgt;const ok=whtr<0.5;h+=`<div class="hrow"><span>Vyötärö-pituussuhde</span><span class="hval ${ok?'good':'warn'}">${whtr.toFixed(2).replace('.',',')} ${ok?'✅':'↑'}</span></div><div class="hsub">Nyrkkisääntö: pidä vyötärö alle puolet pituudesta (alle 0,50).</div>`;}
  if(hgt&&lw!=null){const bmi=lw/Math.pow(hgt/100,2);const ok=bmi>=18.5&&bmi<25;h+=`<div class="hrow"><span>Painoindeksi (BMI)</span><span class="hval ${ok?'good':''}">${bmi.toFixed(1).replace('.',',')}</span></div><div class="hsub">Terveellinen alue 18,5–24,9. Huom: BMI on vain suuntaa antava eikä toimi lihaksikkaan vartalon kohdalla — se ei erottele lihasta rasvasta, joten voimaharjoittelijalla luku voi näyttää korkealta vaikka keho on hyvässä kunnossa.</div>`;}
  const wm=whrLimit(p),whr=currentWHR(p);
  if(wm&&whr!=null){const ok=whr<wm;h+=`<div class="hrow"><span>Vyötärö-lantio-suhde</span><span class="hval ${ok?'good':'warn'}">${whr.toFixed(2).replace('.',',')} ${ok?'✅':'↑'}</span></div><div class="hsub">Terveellinen alle ${wm.toFixed(2).replace('.',',')}${ok?' — hyvä tasapaino!':''}.</div>`;}
  const mins=weeklyActiveMin(),strg=saliWithin(7);
  h+=`<div class="hrow"><span>Liikunta / viikko</span><span class="hval ${mins>=150?'good':''}">${mins} / 150 min</span></div>`;
  h+=`<div class="hrow"><span>Voimaharjoittelu / viikko</span><span class="hval ${strg>=2?'good':''}">${strg} / 2 krt</span></div>`;
  h+=`<div class="hsub">WHO suosittelee aikuisille noin 150 min reipasta liikuntaa ja 2 voimaharjoitusta viikossa.${age?' · Ikäsi: '+age+' v.':''}</div>`;
  h+='<div class="hsub" style="opacity:.7;margin-top:9px">Yleisiä terveyssuosituksia (mm. WHO) — ei henkilökohtaista lääketieteellistä neuvoa.</div>';
  h+='</div>';return h;}
function mealsCountOn(p,d){const f=Object.assign(DEFAULTFOOD(),store.get('food:'+p+':'+d,{}));return (f.aamupala?1:0)+(mealDone(f.lounas)?1:0)+(mealDone(f.paivallinen)?1:0)+((f.valipala.raejuusto||f.valipala.pahkina||f.valipala.rahka)?1:0)+((f.iltapala.leipa||f.iltapala.raejuusto||f.iltapala.rahka||f.iltapala.jogurtti)?1:0);}
function saliWeek(p,wk){let c=0;store.get('workouts:'+p,[]).forEach(x=>{if(x.type==='sali'){const a=x.d.split('-').map(Number);const ago=Math.floor((Date.now()-new Date(a[0],a[1]-1,a[2]).getTime())/86400000);if(ago>=wk*7&&ago<wk*7+7)c++;}});return c;}
function vsBar(p,pct,val,lead){const col=p==='jo'?'linear-gradient(135deg,#b15cff,#ff5fa2)':'linear-gradient(135deg,#22d3c5,#3b82f6)';
  return `<div class="vsbar"><span class="vlabel">${nm(p)}${lead?' 👑':''}</span><div class="vsbar-track"><div class="vsbar-fill" data-w="${Math.round(Math.max(0,Math.min(100,pct)))}" style="background:${col}"></div></div><span class="vval">${val}</span></div>`;}
function vsCard(){const t=dkey(0);
  const mJ=mealsCountOn('jo',t),mR=mealsCountOn('ra',t);
  const wJ=store.get('water:jo:'+t,0),wR=store.get('water:ra:'+t,0),gJ=2000,gR=2500;
  const sJ=saliWeek('jo',0),sR=saliWeek('ra',0);
  const L=(a,b)=>a>b?'jo':b>a?'ra':'';
  const fmtL=ml=>(Math.round(ml/100)/10).toString().replace('.',',')+' l';
  const mL=L(mJ,mR),wL=L(wJ/gJ,wR/gR),sL=L(sJ,sR);
  const CHEERS=['Voittaja saa kehua, häviäjä pesee tiskit 😏','Terve kilpailu, epäterve määrä kunnianhimoa 🔥','Rakkautta on antaa kaikkensa — ja silti haluta voittaa 💞','Kuka vie viikon? Pelimerkit pöytään! 🎯','Hävinnytkin voittaa, kun molemmat treenaa 💪','Pieni nahistelu pitää liekin (ja lihakset) kuumana 🔥','Tänään joku nappaa kärkipaikan. Toivottavasti sinä 😎'];
  const cheer=CHEERS[(new Date().getDate()+new Date().getHours())%CHEERS.length];
  let h='<h2 class="sec">Kisa 🔥</h2><div class="card"><div class="vs-cheer">'+cheer+'</div>';
  h+='<div class="vs-metric"><div class="vs-mtitle">🍽️ Ruokailut tänään</div>'+vsBar('jo',mJ/5*100,mJ+'/5',mL==='jo')+vsBar('ra',mR/5*100,mR+'/5',mL==='ra')+'</div>';
  h+='<div class="vs-metric"><div class="vs-mtitle">💧 Vesi tänään</div>'+vsBar('jo',wJ/gJ*100,fmtL(wJ),wL==='jo')+vsBar('ra',wR/gR*100,fmtL(wR),wL==='ra')+'</div>';
  h+='<div class="vs-metric"><div class="vs-mtitle">🏋️ Salitreenit tällä viikolla</div>'+vsBar('jo',sJ/3*100,sJ+'/3',sL==='jo')+vsBar('ra',sR/3*100,sR+'/3',sL==='ra')+'</div>';
  h+='<div class="hsub">👑 = edellä juuri nyt. Vesi vertaillaan kunkin omaan päivätavoitteeseen. Näkyy molempien data kun synkka on päällä.</div>';
  h+='</div>';return h;}
function changePin(p){lock.person=p;lock.mode='set1';lock.buf='';lock.tmp=null;lock.err='';lock.changing=true;closeSettings();document.getElementById('lock').classList.remove('hidden');renderLock();}
const PGRAD={jo:'linear-gradient(135deg,#b15cff,#ff5fa2)',ra:'linear-gradient(135deg,#22d3c5,#3b82f6)'};
function gtext(p){return `background:${PGRAD[p]};-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800`;}
function renderSettings(){const S=document.getElementById('settings');const waOk=waSupported();const esc=v=>(v||'').replace(/"/g,'&quot;');
  let h='<div class="set-card"><h3>Asetukset</h3>';
  if(!anyPin())h+='<div class="set-mini" style="margin:4px 2px 2px;color:var(--text);font-size:1rem">👋 Tervetuloa! Asettakaa kummallekin PIN-koodi alta — sovellus lukittuu seuraavalla avauksella. Halutessanne voitte myös ottaa Face ID:n käyttöön.</div>';
  const myp=store.get('myProfile','jo');
  h+='<div class="set-sec">Tämän laitteen profiili</div>';
  h+='<div class="set-mini" style="margin:0 2px 8px">Valitse kumpi olet — sovellus avautuu tällä laitteella tähän profiiliin.</div>';
  h+='<div class="segbtns" style="margin-bottom:6px">'+[['jo'],['ra']].map(o=>`<button class="segb ${myp===o[0]?'on':''}" onclick="setMyProfile('${o[0]}')">${nm(o[0])}</button>`).join('')+'</div>';
  h+='<div class="set-sec">Nimet</div>';
  h+=`<div class="set-row" style="border-left:4px solid #ff5fa2;border-radius:0;padding-left:10px"><label style="${gtext('jo')}">Profiili 1</label><input type="text" id="snJo" value="${esc(store.get('name:jo',''))}" placeholder="Kirjoita nimi"></div>`;
  h+=`<div class="set-row" style="border-left:4px solid #3b82f6;border-radius:0;padding-left:10px"><label style="${gtext('ra')}">Profiili 2</label><input type="text" id="snRa" value="${esc(store.get('name:ra',''))}" placeholder="Kirjoita nimi"></div>`;
  const namesSaved=!!(store.get('name:jo',null)||store.get('name:ra',null));
  h+=`<div class="set-row"><button class="btn ${namesSaved?'ok':'grad'}" onclick="saveNames()">${namesSaved?'Nimet tallennettu ✓':'Tallenna nimet'}</button></div>`;
  h+='<div class="set-sec">Sukupuoli & ikä</div>';
  ['jo','ra'].forEach(p=>{const sx=store.get('sex:'+p,''),ag=store.get('age:'+p,''),hg=store.get('height:'+p,'');const edge=p==='jo'?'#ff5fa2':'#3b82f6';
    h+=`<div class="set-prof" style="border-left:4px solid ${edge}"><div class="pn" style="${gtext(p)}">${nm(p)}</div>`;
    h+=`<div style="margin-bottom:9px"><div class="segbtns">`+[['f','Nainen'],['m','Mies'],['x','En halua sanoa']].map(o=>`<button class="segb ${sx===o[0]?'on':''}" onclick="setSex('${p}','${o[0]}')">${o[1]}</button>`).join('')+`</div></div>`;
    h+=`<div class="set-row"><label>Ikä</label><input type="number" inputmode="numeric" id="age_${p}" value="${ag}" placeholder="vuotta" onchange="setAge('${p}',this.value)" style="max-width:120px"></div>`;
    h+=`<div class="set-row"><label>Pituus cm</label><input type="number" inputmode="numeric" id="hgt_${p}" value="${hg}" placeholder="cm" onchange="setHeight('${p}',this.value)" style="max-width:120px"></div>`;
    h+=`<div class="set-mini">Näiden perusteella saat henkilökohtaiset terveysviitteet. Vapaaehtoisia.</div></div>`;});
  h+='<div class="set-sec">PIN-koodit & Face ID</div>';
  ['jo','ra'].forEach(p=>{const has=lkHas(p),reco=!!store.get('recoQ:'+p,null),face=waHas(p);const edge=p==='jo'?'#ff5fa2':'#3b82f6';
    h+=`<div class="set-prof" style="border-left:4px solid ${edge}"><div class="pn" style="${gtext(p)}">${nm(p)}</div><div class="pbtns"><button class="btn ${has?'ok':'grad'}" onclick="changePin('${p}')">${has?'Vaihda PIN':'Aseta PIN'}</button>`;
    if(waOk)h+=face?`<button class="btn ok" onclick="disableFace('${p}')">Face ID käytössä ✓ — poista</button>`:`<button class="btn ghost" onclick="enrollFace('${p}')">Ota Face ID käyttöön</button>`;
    h+='</div>';
    h+=`<div class="set-mini">${has?'PIN asetettu':'PIN puuttuu'}${reco?' · palautuskysymys asetettu':''}${!waOk?' · Face ID vaatii HTTPS-osoitteen':''}</div></div>`;});
  h+='<div class="set-mini" style="margin:6px 2px 14px">Tietoturva: PINit ja Face ID tallennetaan vain tälle laitteelle hashattuna, eivät koodiin. Sovellus ei ota yhteyttä Google-tiliisi tai Driveen.</div>';
  h+='<div class="set-sec">Synkronointi (Google Sheet)</div>';
  const last=store.get('syncLast',0);
  h+=`<div class="set-prof"><div class="set-mini" style="margin:0 0 8px">Jaa kirjaukset puhelinten välillä. Asetukset tallentuvat vain tälle laitteelle. Ohjeet: <b>google-apps-script.gs</b>.</div>`;
  h+=`<div class="set-row"><input type="text" id="syUrl" value="${esc(store.get('syncUrl',''))}" placeholder="Apps Script -verkkosovelluksen URL"></div>`;
  h+=`<div class="set-row"><input type="text" id="sySpace" value="${esc(store.get('syncSpace',''))}" placeholder="Tila-avain (sama molemmilla, esim. meidan-koti)"></div>`;
  h+=`<div class="set-row"><input type="text" id="syToken" value="${esc(store.get('syncToken',''))}" placeholder="Salasana (sama kuin skriptissä)"></div>`;
  h+=`<div class="pbtns"><button class="btn ${syncOn()?'ok':'grad'}" onclick="saveSync()">${syncOn()?'Tallennettu ✓':'Tallenna'}</button><button class="btn ok" onclick="syncPull()">⬇︎ Hae nyt</button><button class="btn ok" onclick="syncPush()">⬆︎ Lähetä nyt</button></div>`;
  h+=`<div class="set-mini" style="margin-top:8px">${syncOn()?'✅ Automaattisynkka päällä — tiedot haetaan sovellusta avatessa ja lähetetään automaattisesti kirjausten jälkeen.':'Täytä kentät ja Tallenna, niin synkka muuttuu automaattiseksi.'} ${last?('Viimeksi: '+new Date(last).toLocaleString('fi-FI')):''}</div></div>`;
  h+='<button class="btn grad" style="width:100%" onclick="closeSettings()">Sulje</button>';
  h+=`<div class="set-mini" style="text-align:center;margin-top:12px;opacity:.7">Versio: ${APP_VERSION}</div></div>`;
  S.innerHTML=h;}
/* Painon suora syöttö */
function editVal(id){state.valEdit=id;renderSali();}
function commitVal(id,v){const x=parseFloat((v||'').replace(',','.'));if(!isNaN(x))setPending(id,Math.max(0,x));state.valEdit=null;renderSali();}
/* ===== SYNKRONOINTI (Google Sheet, valinnainen) =====
   Asetukset (URL, tila-avain, salasana) tallennetaan vain laitteen localStorageen,
   EIVÄT koodiin → eivät näy julkisessa GitHub-koodissa. Sovellus puhuu vain Apps Script
   -osoitteelle, joka pääsee vain yhteen taulukkoon (@OnlyCurrentDoc) — ei Driveen.
   Turva-avaimet (PIN, Face ID, palautus) EIVÄT synkkaannu. */
const SYNC_PREFIXES=['food:','water:','paino:','vyotaro:','lantio:','workouts:','exdef:','hist:','prs:','pend:','goalWeek:','goalBig:','rewards:','wms:','name:','celebday:','badges:','trainGoal:','sex:','age:','height:','cheerFor:','migr_'];
function syncableKey(k){return SYNC_PREFIXES.some(p=>k.indexOf(p)===0);}
function syncCfg(){return {url:store.get('syncUrl',''),space:store.get('syncSpace',''),token:store.get('syncToken','')};}
function syncOn(){const c=syncCfg();return !!(c.url&&c.space);}
function collectLocal(){const out={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&syncableKey(k)){const v=localStorage.getItem(k);if(v!=null)out[k]=v;}}return out;}
let autoSyncReady=false,syncSuppress=false,syncTimer=null;
function scheduleSync(k){if(!autoSyncReady||syncSuppress||!syncOn()||!syncableKey(k))return;clearTimeout(syncTimer);syncTimer=setTimeout(()=>syncPush(true),1500);}
function saveSync(){const u=(document.getElementById('syUrl').value||'').trim(),s=(document.getElementById('sySpace').value||'').trim(),t=(document.getElementById('syToken').value||'').trim();store.set('syncUrl',u);store.set('syncSpace',s);store.set('syncToken',t);autoSyncReady=true;toast('Synkka-asetukset tallennettu');renderSettings();if(syncOn())syncPull(true);}
async function syncPush(silent){if(!syncOn()){if(!silent)toast('Täytä synkka-asetukset ensin');return;}const c=syncCfg();
  try{const res=await fetch(c.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'push',space:c.space,token:c.token,updated:Date.now(),data:collectLocal()})});
    const j=await res.json();if(j.ok){store.set('syncLast',Date.now());if(!silent)toast('⬆︎ Lähetetty pilveen');}else if(!silent)toast('Synkka epäonnistui: '+(j.error||'?'));}
  catch(e){if(!silent)toast('Synkka epäonnistui (verkko/osoite)');}
  if(!silent&&!document.getElementById('settings').classList.contains('hidden'))renderSettings();}
async function syncPull(silent){if(!syncOn()){if(!silent)toast('Täytä synkka-asetukset ensin');return;}const c=syncCfg();
  try{const res=await fetch(c.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'pull',space:c.space,token:c.token})});
    const j=await res.json();
    if(j.ok&&j.data){syncSuppress=true;Object.keys(j.data).forEach(k=>{if(syncableKey(k)){try{localStorage.setItem(k,j.data[k]);delete mem[k];}catch(e){}}});cleanSeeds();store.set('syncLast',Date.now());syncSuppress=false;if(!silent)toast('⬇︎ Haettu pilvestä');refreshNames();updateDateLabel();renderDateBanner();renderActive();checkCheer();if(!document.getElementById('settings').classList.contains('hidden'))renderSettings();}
    else if(j.ok){if(!silent)toast('Pilvessä ei vielä dataa');}
    else if(!silent)toast('Synkka epäonnistui: '+(j.error||'?'));}
  catch(e){if(!silent)toast('Synkka epäonnistui (verkko/osoite)');}}
async function bootSync(){if(syncOn()){await syncPull(true);}autoSyncReady=true;}

initData();
refreshNames();
updateDateLabel();
renderDateBanner();
state.person=store.get('myProfile','jo');
setPerson(state.person);
showLock();
if(!anyPin()&&!store.get('welcomed',false)){store.set('welcomed',true);openSettings();}
bootSync();
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&autoSyncReady&&syncOn())syncPull(true);});
if('serviceWorker' in navigator){try{navigator.serviceWorker.register('sw.js');}catch(e){}}
</script>
