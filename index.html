<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CoupleGoals</title>
<meta name="theme-color" content="#131019">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CoupleGoals">
<meta name="mobile-web-app-capable" content="yes">
<!-- Etukäteissovellus. Vaihe 2: store synkkaa Google Sheetiin (CONFIG.SHEET_API_URL).
     Historiat säilyvät avaimittain (hist/paino/vyotaro/workouts/prs : person) myös arkistoinnin jälkeen. -->
<style>
  :root{
    --bg:#131019; --bg2:#1a1626; --surface:#211c30; --surface2:#2b2540; --surfsel:#322a4a;
    --line:#352e4b; --text:#F1EDF8; --muted:#b3acc4; --dim:#cfc9dd; --ok:#37d399; --gold:#ffd166; --warn:#ff8a8a;
    --p1:#b15cff; --p2:#ff5fa2;
    --grad:linear-gradient(135deg,#b15cff,#ff5fa2);
  }
  body.jo{ --p1:#b15cff; --p2:#ff5fa2; --grad:linear-gradient(135deg,#b15cff,#ff5fa2); }
  body.ra{ --p1:#22d3c5; --p2:#3b82f6; --grad:linear-gradient(135deg,#22d3c5,#3b82f6); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;width:100%;max-width:100%;overflow-x:hidden;overscroll-behavior:none;}
  body{background:var(--bg);color:var(--text);position:fixed;inset:0;width:100%;display:flex;flex-direction:column;overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;line-height:1.5;font-size:19px;
    background-image:radial-gradient(120% 60% at 50% -10%, color-mix(in srgb,var(--p1) 26%, transparent), transparent 70%);}

  header{padding:calc(env(safe-area-inset-top) + 14px) 16px 13px;flex:none;position:relative;
    background:linear-gradient(135deg, color-mix(in srgb,var(--p1) 32%,#1a1626), color-mix(in srgb,var(--p2) 22%,#1a1626));
    border-bottom:1px solid var(--line);}
  .h-top{display:flex;align-items:center;justify-content:space-between;}
  .title{font-weight:800;font-size:1.28rem;letter-spacing:.2px;}
  .date{font-size:1rem;color:var(--text);opacity:.85;}
  .who{display:flex;gap:9px;margin-top:12px;}
  .who button{flex:1;border:1.5px solid transparent;background:rgba(255,255,255,.07);color:var(--muted);
    font-weight:800;font-size:1.18rem;padding:12px;border-radius:13px;cursor:pointer;font-family:inherit;letter-spacing:.3px;}
  .who button.on{color:#fff;background:var(--grad);box-shadow:0 4px 16px color-mix(in srgb,var(--p1) 45%,transparent);}

  main{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;width:100%;max-width:100%;padding:15px 14px 30px;-webkit-overflow-scrolling:touch;}
  .view{display:none;} .view.active{display:block;animation:f .22s ease;}
  @keyframes f{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

  h2.sec{font-size:1.02rem;letter-spacing:.06em;text-transform:uppercase;font-weight:800;margin:22px 3px 11px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  h2.sec:first-child{margin-top:2px;}
  h3.sub{font-size:1.14rem;font-weight:800;margin:18px 3px 9px;color:var(--text);}
  .preview-tag{font-size:1.0rem;color:var(--muted);font-style:italic;margin:0 3px 12px;line-height:1.45;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:12px;}
  .amt{font-size:1.04rem;color:var(--dim);}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .chip{border:1.5px solid var(--line);background:var(--surface2);border-radius:12px;padding:11px 14px;
    font-size:1.06rem;font-weight:700;color:var(--text);cursor:pointer;display:flex;flex-direction:column;gap:2px;}
  .chip small{font-weight:600;color:var(--dim);font-size:.95rem;}
  .chip.sel{border-color:transparent;background:var(--grad);color:#fff;}
  .chip.sel small{color:rgba(255,255,255,.9);}

  .tog{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;margin-bottom:9px;cursor:pointer;}
  .tog .box{width:28px;height:28px;border-radius:8px;border:2.5px solid var(--muted);flex:none;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.05rem;}
  .tog .lbl{font-weight:700;font-size:1.2rem;}
  .tog .lbl small{display:block;font-weight:600;color:var(--dim);font-size:1.08rem;line-height:1.42;margin-top:3px;}
  .tog.done{border-color:transparent;background:linear-gradient(135deg,color-mix(in srgb,var(--p1) 22%,var(--surface)),color-mix(in srgb,var(--p2) 16%,var(--surface)));}
  .tog.done .box{background:var(--grad);border-color:transparent;}
  .optbtn{position:relative;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:16px 15px;margin-bottom:11px;cursor:pointer;}
  .optbtn.sel{border-color:transparent;background:linear-gradient(135deg,color-mix(in srgb,var(--p1) 22%,var(--surface)),color-mix(in srgb,var(--p2) 16%,var(--surface)));}
  .ob-top{display:flex;align-items:center;gap:12px;}
  .ob-ttl{font-weight:800;font-size:1.26rem;flex:1;line-height:1.3;}
  .ob-check{width:38px;height:38px;border-radius:10px;border:2.5px solid var(--muted);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;}
  .ob-check.on{background:var(--grad);border-color:transparent;}
  .ob-more{font-size:1.0rem;color:var(--muted);font-weight:700;margin-top:9px;}
  .ob-detail{font-size:1.1rem;color:var(--dim);margin-top:11px;line-height:1.5;border-top:1px solid var(--line);padding-top:11px;}
  .sqgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px;margin-bottom:11px;}
  .sqgrid .optbtn{overflow:hidden;}
  .ob-ttl,.ob-detail,.ob-more{overflow-wrap:anywhere;}
  .sqgrid .optbtn{margin-bottom:0;padding:14px 13px;display:flex;flex-direction:column;}
  .sqgrid .ob-ttl{font-size:1.12rem;}
  .sqgrid .ob-check{width:32px;height:32px;font-size:1.15rem;}
  .sqgrid .ob-more,.sqgrid .ob-detail{font-size:.98rem;}
  .dash{background:linear-gradient(135deg,color-mix(in srgb,var(--p1) 18%,var(--surface)),color-mix(in srgb,var(--p2) 12%,var(--surface)));border:1px solid var(--line);border-radius:18px;padding:16px 16px 12px;margin-bottom:15px;}
  .dash svg{width:100%;height:auto;display:block;max-width:300px;margin:0 auto;}
  .dash .dash-greet{text-align:center;font-weight:800;font-size:1.1rem;line-height:1.35;margin-bottom:8px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .dash .dash-vs{width:100%;margin-top:10px;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:11px;font-weight:800;font-family:inherit;font-size:1.0rem;cursor:pointer;}
  .dash .dleg{display:flex;justify-content:space-around;gap:8px;margin-top:6px;text-align:center;}
  .dash .dleg .dn{font-weight:800;font-size:.98rem;}
  .dash .dleg .dv{font-size:.92rem;color:var(--dim);}
  .dash .dleg .dot{width:14px;height:14px;border-radius:50%;margin:0 auto 4px;}
  .foodhero{background:linear-gradient(135deg,color-mix(in srgb,var(--p1) 30%,var(--surface)),color-mix(in srgb,var(--p2) 24%,var(--surface)));border:1px solid var(--line);border-radius:18px;padding:16px 16px 14px;margin-bottom:15px;}
  .foodhero .fh-t{font-size:1.3rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;width:fit-content;}
  .foodhero .fh-s{font-size:1.1rem;color:var(--text);opacity:.92;margin-top:5px;line-height:1.45;}
  .foodhero .fh-prog{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;}
  .fh-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:20px;padding:8px 13px;font-size:1.0rem;font-weight:700;color:var(--dim);font-family:inherit;cursor:pointer;}
  .fh-chip.on{background:var(--grad);color:#fff;border-color:transparent;}
  .fh-chip:active{transform:scale(.96);}
  .waterhint{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,color-mix(in srgb,#3b82f6 22%,var(--surface)),color-mix(in srgb,#22d3c5 15%,var(--surface)));border:1px solid var(--line);border-radius:16px;padding:12px 15px;margin-bottom:15px;cursor:pointer;}
  .waterhint .wh-drop{flex:none;filter:drop-shadow(0 3px 8px rgba(59,130,246,.4));}
  .waterhint .wh-t{font-weight:800;font-size:1.06rem;}
  .waterhint .wh-s{font-size:1.02rem;color:var(--dim);margin-top:3px;line-height:1.42;}

  .typebar{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:11px;}
  .typebar button{border:1.5px solid var(--line);background:var(--surface2);border-radius:12px;
    padding:14px 6px;font-size:1.08rem;font-weight:800;color:var(--muted);cursor:pointer;font-family:inherit;}
  .typebar button.on{border-color:transparent;background:var(--grad);color:#fff;}
  .progbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:4px 0 14px;}
  .progbar button{border:1.5px solid var(--line);background:var(--surface2);border-radius:12px;padding:13px 4px;font-size:.98rem;font-weight:800;color:var(--muted);cursor:pointer;font-family:inherit;}
  .progbar button.on{border-color:transparent;background:var(--grad);color:#fff;}
  .hint{font-size:1.02rem;color:var(--text);opacity:.95;background:rgba(255,255,255,.05);border-radius:10px;
    padding:10px 13px;margin-top:10px;border-left:3px solid var(--p1);}

  /* TREENI */
  .exrow{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-bottom:12px;position:relative;overflow:hidden;}
  .exrow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--grad);}
  .ex-h{display:flex;align-items:flex-start;gap:9px;}
  .ex-h .nm{font-weight:800;font-size:1.22rem;flex:1;}
  .ex-h .tg{font-size:1.02rem;color:var(--dim);margin-top:2px;}
  .icon-btn{background:rgba(255,255,255,.07);border:none;color:var(--muted);width:38px;height:38px;border-radius:9px;font-size:1.1rem;cursor:pointer;flex:none;}
  .stepper{display:flex;align-items:center;gap:12px;margin-top:12px;}
  .stepper button{width:52px;height:52px;border-radius:13px;border:1.5px solid var(--line);cursor:pointer;font-size:1.8rem;font-weight:800;line-height:1;font-family:inherit;background:var(--surface2);color:var(--text);}
  .stepper .val{font-size:1.95rem;font-weight:800;min-width:96px;text-align:center;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;cursor:pointer;}
  .stepper .val small{font-size:.85rem;color:var(--muted);font-weight:700;-webkit-text-fill-color:var(--muted);}
  .pr{font-size:.92rem;color:var(--gold);font-weight:800;margin-left:auto;}
  .exchart{margin-top:12px;}
  .edit-grid{display:flex;flex-direction:column;gap:9px;margin-top:11px;}
  .edit-grid input,.lk input,.mt input{background:var(--bg2);border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;color:var(--text);font-size:1.08rem;font-family:inherit;width:100%;}
  .edit-row{display:flex;gap:9px;} .edit-row input{flex:1;}
  .btn{border:none;border-radius:12px;padding:13px 15px;font-weight:800;font-size:1.04rem;cursor:pointer;font-family:inherit;}
  .btn.grad{background:var(--grad);color:#fff;} .btn.ghost{background:var(--surface2);color:var(--text);border:1.5px solid var(--line);}
  .btn.danger{background:rgba(255,90,90,.16);color:#ff9a9a;} .btn.full{width:100%;}
  .row-btns{display:flex;gap:9px;margin-top:11px;}
  .save{width:100%;margin-top:5px;background:var(--grad);color:#fff;border:none;border-radius:15px;padding:17px;font-weight:800;font-size:1.16rem;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px color-mix(in srgb,var(--p1) 40%,transparent);}
  .savednote{text-align:center;font-size:1rem;color:var(--ok);margin-top:10px;min-height:1em;font-weight:700;}
  .archive-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-top:6px;font-weight:800;font-size:1.04rem;}
  .arch-item{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px dashed var(--line);border-radius:13px;padding:12px 14px;margin-top:9px;}
  .arch-item .nm{flex:1;font-weight:700;font-size:1.04rem;color:var(--muted);}

  /* LENKIT */
  .lk{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:12px;}
  .lk .row{display:flex;gap:9px;margin-top:10px;}
  .lk .row input{flex:1;}
  .lenkki-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 14px;margin-bottom:8px;font-size:1.04rem;}
  .lenkki-item .em{font-size:1.3rem;} .lenkki-item .r{margin-left:auto;color:var(--dim);font-size:.98rem;}
  .traingoal{display:flex;align-items:flex-start;gap:10px;background:linear-gradient(135deg,color-mix(in srgb,var(--p1) 26%,var(--surface)),color-mix(in srgb,var(--p2) 18%,var(--surface)));border:1px solid var(--line);border-radius:15px;padding:12px 14px;margin:0 0 14px;}
  .traingoal .tg-icon{font-size:1.3rem;flex:none;line-height:1.3;}
  .traingoal .tg-txt{flex:1;font-weight:700;font-size:1rem;line-height:1.42;}
  .traingoal .tg-edit{flex:none;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:2px 4px;font-family:inherit;}
  .salicheer{font-weight:800;font-size:1.06rem;text-align:center;margin:0 0 14px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.35;}
  .lenkki-item .wdel{flex:none;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px 6px;margin-left:8px;font-family:inherit;}
  .lenkki-item .wdel:active{color:var(--warn);}

  /* VESI */
  .water-wrap{display:flex;gap:16px;align-items:center;}
  .bottle{width:92px;flex:none;}
  .water-info .big{font-size:2.3rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .water-info .big small{font-size:1.05rem;color:var(--muted);font-weight:700;-webkit-text-fill-color:var(--muted);}
  .water-info .motiv{font-size:1.08rem;color:var(--text);font-weight:700;margin-top:4px;min-height:1.2em;}
  .water-btns{display:flex;gap:10px;margin-top:15px;}
  .water-btns button{flex:1;border:1.5px solid var(--line);border-radius:13px;padding:17px 4px;font-weight:800;font-size:1.18rem;cursor:pointer;font-family:inherit;background:var(--surface2);color:var(--text);}
  .water-btns button.plus{background:var(--grad);color:#fff;border-color:transparent;}
  .streak{margin-top:13px;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:14px 15px;display:flex;align-items:center;gap:14px;}
  .streak .fire{font-size:2.1rem;} .streak .s-n{font-size:1.95rem;font-weight:800;color:var(--gold);} .streak .s-t{font-size:1rem;color:var(--dim);}

  /* summary / badges */
  .etapit{display:flex;gap:10px;flex-wrap:wrap;}
  .badge{flex:1;min-width:96px;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px;text-align:center;}
  .badge .em{font-size:1.7rem;} .badge .bn{font-size:1.55rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;} .badge .bt{font-size:.9rem;color:var(--dim);}
  .badge.lock{opacity:.45;}

  /* partner */
  .pp-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:1.06rem;flex-wrap:wrap;}
  .pp-row:last-of-type{border-bottom:none;}
  .pp-name{font-weight:800;min-width:92px;} .pp-name.jo{color:#cd97ff;} .pp-name.ra{color:#5cd0e6;}
  .pp-stat{color:var(--dim);font-size:1rem;}
  .cheer-hi{background:linear-gradient(135deg,color-mix(in srgb,var(--p1) 26%,var(--surface)),color-mix(in srgb,var(--p2) 18%,var(--surface)));border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-top:11px;font-size:1.05rem;font-weight:700;}

  /* rewards */
  .rw{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;}
  .rw .d{font-weight:800;font-size:1.1rem;min-width:72px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .rw input{flex:1;background:var(--bg2);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--text);font-size:1.02rem;font-family:inherit;}
  .rw .st{font-size:1.4rem;flex:none;}
  .rw.earned{border-color:var(--gold);}
  .goal-prog .gp-top{display:flex;justify-content:space-between;gap:10px;font-weight:700;font-size:1.06rem;margin-bottom:8px;}
  .bar{height:13px;background:var(--surface2);border-radius:8px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--grad);border-radius:8px;transition:width .35s;}
  .goal-prog .gp-st{font-size:1.02rem;color:var(--dim);margin-top:8px;font-weight:600;}
  .goal-inputs{display:flex;flex-direction:column;gap:11px;margin-top:13px;}
  .gi{display:flex;flex-direction:column;gap:5px;}
  .gi label{font-weight:700;font-size:1.02rem;color:var(--dim);}
  .gi input{background:var(--bg2);border:1.5px solid var(--line);border-radius:11px;padding:13px 13px;color:var(--text);font-size:1.1rem;font-family:inherit;width:100%;}

  /* charts */
  .chartbox{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px 14px 7px;margin-bottom:12px;}
  .chartbox h4{margin:0 0 2px;font-size:1.08rem;}
  .mt .row{display:flex;gap:9px;margin-top:10px;align-items:center;}
  .mt .row label{min-width:88px;font-weight:700;font-size:1.06rem;}
  svg{display:block;width:100%;height:auto;}

  nav{display:flex;background:var(--bg2);border-top:1px solid var(--line);flex:none;padding-bottom:env(safe-area-inset-bottom);}
  nav button{flex:1;border:none;background:none;padding:10px 2px 12px;cursor:pointer;font-family:inherit;color:var(--muted);font-weight:700;font-size:.82rem;}
  nav button .ic{display:block;font-size:1.55rem;margin-bottom:2px;filter:grayscale(.4);}
  nav button.on{color:transparent;background:var(--grad);-webkit-background-clip:text;background-clip:text;}
  nav button.on .ic{filter:none;}
  /* LOCK SCREEN */
  #lock{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:calc(env(safe-area-inset-top) + 28px) 24px 28px;background:var(--bg);background-image:radial-gradient(120% 60% at 50% 12%, color-mix(in srgb,var(--p1) 26%, transparent), transparent 70%);color:var(--text);text-align:center;overflow-y:auto;}
  #lock.hidden{display:none;}
  #lock .lk-icon{font-size:3.4rem;filter:drop-shadow(0 4px 14px color-mix(in srgb,var(--p1) 50%,transparent));}
  #lock .lk-title{font-size:1.55rem;font-weight:800;letter-spacing:.01em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #lock .lk-cg{font-size:1.04rem;font-weight:700;font-style:italic;letter-spacing:.01em;margin-top:-4px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #lock .lk-sub{font-size:1.02rem;color:var(--dim);font-weight:600;min-height:1.2em;line-height:1.4;}
  #lock .lk-dots{display:flex;gap:16px;margin:4px 0;}
  #lock .lk-dots span{width:17px;height:17px;border-radius:50%;border:2px solid var(--p1);transition:background .12s;}
  #lock .lk-dots span.f{background:var(--grad);border-color:transparent;}
  #lock .lk-pad{display:grid;grid-template-columns:repeat(3,70px);gap:13px;}
  #lock .lk-pad button{width:70px;height:70px;border-radius:50%;border:1.5px solid var(--line);background:var(--surface);font-size:1.7rem;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  #lock .lk-pad button span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
  #lock .lk-pad button:active{box-shadow:0 0 0 2px color-mix(in srgb,var(--p1) 55%,transparent) inset;}

<script>
const CONFIG={SHEET_API_URL:""};
const APP_VERSION='18.6.2026 · vesiputki korjattu + valevesipäivät pois';
const mem={};
const store={get(k,def){try{const v=localStorage.getItem(k);return v==null?(k in mem?mem[k]:def):JSON.parse(v);}catch(e){return (k in mem)?mem[k]:def;}},
  set(k,v){mem[k]=v;try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}if(typeof scheduleSync==='function')scheduleSync(k);}};
const state={person:'jo',date:null,view:'ruoka',prog:1,editing:null,adding:false,showArchive:false};
function dkey(off){const d=new Date();d.setDate(d.getDate()-(off||0));return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
state.date=dkey(0);
function within(dstr,n){const a=dstr.split('-').map(Number);const dt=new Date(a[0],a[1]-1,a[2]);return (Date.now()-dt.getTime())/86400000 < n;}
const WDAYS=['su','ma','ti','ke','to','pe','la'];
function pad2(n){return (n<10?'0':'')+n;}
function curDateObj(){const a=state.date.split('-').map(Number);return new Date(a[0],a[1]-1,a[2]);}
function dateInputVal(dstr){const a=dstr.split('-').map(Number);return a[0]+'-'+pad2(a[1])+'-'+pad2(a[2]);}
function fmtDateLabel(){const d=curDateObj(),today=dkey(0)===state.date;return (today?'Tänään ':'📅 ')+WDAYS[d.getDay()]+' '+d.getDate()+'.'+(d.getMonth()+1)+'.';}
function updateDateLabel(){const el=document.getElementById('dateLbl');if(!el)return;el.textContent=fmtDateLabel();el.classList.toggle('past',dkey(0)!==state.date);}
function renderDateBanner(){const b=document.getElementById('dateBanner');if(!b)return;if(dkey(0)===state.date){b.classList.add('hidden');b.innerHTML='';return;}const d=curDateObj();b.classList.remove('hidden');b.innerHTML=`📅 Kirjaat menneelle päivälle: <b>${WDAYS[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}.</b><button onclick="resetToday()">↩︎ Tänään</button>`;}
let dpY,dpM;
function openDatePop(){const a=state.date.split('-').map(Number);dpY=a[0];dpM=a[1];document.getElementById('datepop').classList.remove('hidden');renderDatePop();}
function closeDatePop(){document.getElementById('datepop').classList.add('hidden');}
function dpNav(delta){dpM+=delta;if(dpM<1){dpM=12;dpY--;}else if(dpM>12){dpM=1;dpY++;}renderDatePop();}
function dpPick(d){setDate(dpY+'-'+dpM+'-'+d);closeDatePop();}
function dpToday(){resetToday();closeDatePop();}
function renderDatePop(){const MN=['Tammikuu','Helmikuu','Maaliskuu','Huhtikuu','Toukokuu','Kesäkuu','Heinäkuu','Elokuu','Syyskuu','Lokakuu','Marraskuu','Joulukuu'];
  const tA=dkey(0).split('-').map(Number),todayObj=new Date(tA[0],tA[1]-1,tA[2]),sel=state.date.split('-').map(Number);
  const startWd=(new Date(dpY,dpM-1,1).getDay()+6)%7,days=new Date(dpY,dpM,0).getDate();
  const nextBlocked=(dpY>tA[0]||(dpY===tA[0]&&dpM>=tA[1]));
  let h='<div class="dp-card"><div class="dp-head"><button onclick="dpNav(-1)">‹</button><div class="dp-title">'+MN[dpM-1]+' '+dpY+'</div><button onclick="dpNav(1)" '+(nextBlocked?'disabled':'')+'>›</button></div><div class="dp-grid">';
  ['ma','ti','ke','to','pe','la','su'].forEach(w=>h+='<div class="wd">'+w+'</div>');
  for(let i=0;i<startWd;i++)h+='<div class="empty"></div>';
  for(let d=1;d<=days;d++){const future=new Date(dpY,dpM-1,d)>todayObj;const isSel=(dpY===sel[0]&&dpM===sel[1]&&d===sel[2]);const isToday=(dpY===tA[0]&&dpM===tA[1]&&d===tA[2]);
    h+=`<button class="${isSel?'sel':''}${isToday?' today':''}" ${future?'disabled':''} onclick="dpPick(${d})">${d}</button>`;}
  h+='</div><div class="dp-foot"><button class="today-b" onclick="dpToday()">Tänään</button><button class="close-b" onclick="closeDatePop()">Sulje</button></div></div>';
  document.getElementById('datepop').innerHTML=h;}
function setDate(val){if(!val)return;const a=val.split('-').map(Number);state.date=a[0]+'-'+a[1]+'-'+a[2];state.editing=null;state.adding=false;state.valEdit=null;afterDateChange();}
function resetToday(){state.date=dkey(0);state.editing=null;state.adding=false;state.valEdit=null;afterDateChange();}
function afterDateChange(){updateDateLabel();renderDateBanner();renderActive();}
function p1(){return getComputedStyle(document.body).getPropertyValue('--p1').trim();}
function p2(){return getComputedStyle(document.body).getPropertyValue('--p2').trim();}
const NUM=v=>(v/1000).toFixed(1).replace('.',',');

/* CONFETTI + TOAST */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function confetti(big){const c=document.getElementById('confetti'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
  const cols=[p1(),p2(),'#ffd166','#ffffff'];const N=big?280:150;let ps=[];
  for(let i=0;i<N;i++)ps.push({x:innerWidth/2+(Math.random()-.5)*(big?260:160),y:innerHeight*.3,vx:(Math.random()-.5)*(big?13:10),vy:Math.random()*-(big?13:10)-3,g:.30,s:5+Math.random()*7,col:cols[i%cols.length],rot:Math.random()*6,vr:(Math.random()-.5)*.45,life:0});
  let t=0;(function fr(){ctx.clearRect(0,0,c.width,c.height);t++;let al=false;ps.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life++;if(p.y<c.height+30)al=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=Math.max(0,1-p.life/(big?120:95));ctx.fillStyle=p.col;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();});if(al&&t<(big?160:130))requestAnimationFrame(fr);else ctx.clearRect(0,0,c.width,c.height);})();}
function celebrate(msg,big){toast(msg);confetti(big);}

/* CHART */
function lineChart(id,opts){
  const W=opts.width||300,H=opts.height||120,padL=32,padR=12,padT=12,padB=18;
  const cats=opts.categories,series=opts.series;let all=[];series.forEach(s=>s.data.forEach(v=>{if(v!=null)all.push(v);}));
  const refs=[];if(opts.goal!=null)refs.push(opts.goal);if(opts.ref!=null)refs.push(opts.ref.val);
  if(!all.length){document.getElementById(id).innerHTML='<div style="font-size:1rem;color:var(--muted);padding:8px 2px">Ei vielä dataa — kirjaa ensimmäinen tulos.</div>';return;}
  let min=Math.min(...all,...refs),max=Math.max(...all,...refs);const rg=(max-min)||1;min-=rg*.1;max+=rg*.1;
  const x=i=>padL+(W-padL-padR)*(cats.length<2?0.5:i/(cats.length-1));
  const y=v=>padT+(H-padT-padB)*(1-(v-min)/(max-min));const gid='g_'+id;
  let svg=`<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${p1()}"/><stop offset="1" stop-color="${p2()}"/></linearGradient><linearGradient id="${gid}f" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${p1()}" stop-opacity=".28"/><stop offset="1" stop-color="${p1()}" stop-opacity="0"/></linearGradient></defs>`;

function dayNum(dstr){const a=dstr.split('-').map(Number);return Math.floor(new Date(a[0],a[1]-1,a[2]).getTime()/86400000);}
function regr(pts){const n=pts.length;if(n<2)return null;let st=0,sw=0,stt=0,stw=0;pts.forEach(p=>{st+=p.t;sw+=p.w;stt+=p.t*p.t;stw+=p.t*p.w;});const den=n*stt-st*st;if(den===0)return null;const slope=(n*stw-st*sw)/den;return {slope,intercept:(sw-slope*st)/n};}
function predictGoal(scope,g){const m=metricDef(scope,g.metric);if(!m||!(g.target>0))return '';
  let series=null;
  if(g.metric==='paino')series=store.get('paino:'+state.person,[]);
  else if(g.metric==='vyotaro')series=store.get('vyotaro:'+state.person,[]);
  else if(g.metric==='liike'&&g.exName){series=[];[1,2,3].forEach(pr=>store.get('exdef:'+state.person+':'+pr,[]).forEach(e=>{if(e.n===g.exName)series=series.concat(hist(e.id));}));}
  if(!series)return '';
  const pts=series.filter(x=>x&&!x.demo&&x.w!=null).map(x=>({t:dayNum(x.d),w:x.w}));
  if(pts.length<2)return '';
  const r=regr(pts);if(!r||r.slope===0)return '';
  const toward=m.dir==='down'?r.slope<0:r.slope>0;
  if(!toward)return '🔮 Ennuste: nykytrendi ei vielä vie tavoitteeseen.';
  const tTarget=(g.target-r.intercept)/r.slope,lastT=pts[pts.length-1].t,days=Math.ceil(tTarget-lastT);
  if(days<=0)return '🔮 Ennuste: tavoite on jo käden ulottuvilla!';
  if(days>3650)return '';
  const dt=new Date(Date.now()+days*86400000);
  return `🔮 Ennuste: tällä vauhdilla ~${dt.getDate()}.${dt.getMonth()+1}.${dt.getFullYear()} (n. ${days} pv).`;
}

};
const PROT={jo:[{k:'kala',n:'Kala',a:'~120 g'},{k:'kana',n:'Kana',a:'~120 g'},{k:'liha',n:'Liha',a:'~120 g'}],ra:[{k:'kala',n:'Kala',a:'~180 g'},{k:'kana',n:'Kana',a:'~190 g'},{k:'liha',n:'Liha',a:'~190 g'}]};
const CARB={jo:[{k:'peruna',n:'Peruna',a:'~150 g'},{k:'riisi',n:'Riisi',a:'1 dl'}],ra:[{k:'peruna',n:'Peruna',a:'~250 g'},{k:'riisi',n:'Riisi',a:'2 dl'}]};

  ra:[{k:'bolognese',n:'Spag. bolognese'},{k:'tortilla',n:'Tortilla'},{k:'kookos',n:'Kana-kookos'},{k:'carbonara',n:'Carbonara'},{k:'hese',n:'Hese / Mäkki'},{k:'sushi',n:'Sushi',a:'~14–18 palaa (2 rullaa)'}]};
function DEFAULTFOOD(){return {aamupala:null,lounas:{tyyppi:'lautas',prot:null,salaatti:false,carb:null,keitto:null,grill:null,muu:null},paivallinen:{tyyppi:'lautas',prot:null,salaatti:false,carb:null,keitto:null,grill:null,muu:null},valipala:{maitokahvi:false,raejuusto:false,pahkina:false,rahka:false},iltapala:{leipa:false,raejuusto:false,rahka:false,jogurtti:false},herkut:{karkit:false,sipsit:false,letut:false,jatski:false,muu:false},palautus:false,sauna:false};}
function foodState(){return Object.assign(DEFAULTFOOD(),store.get('food:'+state.person+':'+state.date,{}));}
function foodOf(p){return Object.assign(DEFAULTFOOD(),store.get('food:'+p+':'+state.date,{}));}
function saveFood(f){store.set('food:'+state.person+':'+state.date,f);checkDay();}
function mealDone(m){return m.tyyppi==='lautas'?(m.prot&&m.carb):m.tyyppi==='keitto'?!!m.keitto:m.tyyppi==='grilli'?!!m.grill:!!m.muu;}
function checkDay(){const f=foodState();const done=f.aamupala&&mealDone(f.lounas)&&mealDone(f.paivallinen)&&waterToday()>=waterGoal();
  const flag='celebday:'+state.person+':'+state.date;if(done&&!store.get(flag,false)){store.set(flag,true);celebrate('🎉 Päivä putkessa – ruoat ja vesi kohdillaan!');checkGoals();}}

/* RENDER RUOKA */
function arc180(r,stroke,pct){const L=Math.PI*r,off=(L*(1-Math.max(0,Math.min(1,pct)))).toFixed(1),Ls=L.toFixed(1),d=`M ${82-r} 92 A ${r} ${r} 0 0 1 ${82+r} 92`;
  return `<path d="${d}" fill="none" stroke="var(--surface2)" stroke-width="12"/><path d="${d}" fill="none" stroke="${stroke}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${Ls}"><animate attributeName="stroke-dashoffset" dur="0.9s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1" values="${Ls};${off}"/></path>`;}
function fiHour(){try{const h=parseInt(new Intl.DateTimeFormat('en-GB',{hour:'numeric',hour12:false,timeZone:'Europe/Helsinki'}).format(new Date()),10);return isNaN(h)?new Date().getHours():(h%24);}catch(e){return new Date().getHours();}}
function greetLine(){const nme=nm(state.person),hh=fiHour();let arr;
  if(hh>=5&&hh<10)arr=[`Huomenta, ${nme}! Kahvi kantaa, sinä jyräät ☕💪`,`Hyvää huomenta, ${nme}! Peti narisi, mutta sinä nouset voittajana 🌅`,`Huomenta, ${nme}! Tänään ei tekosyitä — paitsi ehkä yksi haukotus 😏`,`Aamuvirkku ${nme}! Maailma kuuluu aikaisin heränneille (ja kahvinjuojille) ☕`];
  else if(hh>=10&&hh<17)arr=[`Päivää, ${nme}! Pieni hiki, iso fiilis 💦`,`Moi ${nme}! Lautanen proteiinia ja maailma on sinun 🍗`,`${nme}, tänään olet oma valmentajasi — ja pomo on tyytyväinen 💪`,`Hei ${nme}! Vettä, treeniä ja hymyä — tässä järjestyksessä tai miten vaan 💧`,`Päivää, ${nme}! You CAN do it — ja jos et tänään, niin huomenna tuplana 😎`];
  else if(hh>=17&&hh<22)arr=[`Iltaa, ${nme}! Sohva ei karkaa minnekään — ehdit vielä 🛋️➡️🏋️`,`Hyvää iltaa, ${nme}! Päivän viimeinen kulaus vettä? 💧`,`${nme}, illan tähti ✨ Viimeistellään päivän tavoitteet!`,`Iltaa, ${nme}! Tänään tehty on huomenna ylpeyden aihe 🌆`];
  else arr=[`Kello on jo paljon, ${nme}… olisko aika nukkumaan, vai haluatko olla huomennakin väsynyt? 😁`,`Öitä, ${nme}! Salaa kirjaamassa treenejä? Sankari 🌙`,`${nme}, vielä hereillä? Uni rakentaa lihasta — pussukkaan siitä 😴`,`Yön ritari ${nme}! Huomenna jyrätään taas 🌛`,`Pikku yökyöpeli ${nme} — lepo on osa treeniä, oikeasti. Hyvää yötä 💤`];
  return arr[(new Date().getDate()+hh)%arr.length];}
function foodDashboard(f){const aDone=!!f.aamupala,lDone=mealDone(f.lounas),pDone=mealDone(f.paivallinen),vDone=!!(f.valipala.raejuusto||f.valipala.pahkina||f.valipala.rahka),iDone=!!(f.iltapala.leipa||f.iltapala.raejuusto||f.iltapala.rahka||f.iltapala.jogurtti);
  const mealsDone=(aDone?1:0)+(lDone?1:0)+(pDone?1:0)+(vDone?1:0)+(iDone?1:0);
  const mpct=Math.min(1,mealsDone/5),wpct=Math.min(1,waterToday()/waterGoal()),spct=Math.min(1,saliWithin(7)/3);
  const score=Math.round((mpct+wpct+spct)/3*100);
  const wlD=(Math.round(waterToday()/100)/10).toString().replace('.',','),wgD=(waterGoal()/1000).toString().replace('.',',');
  const greet=greetLine();
  return `<div class="dash"><div class="dash-greet">${greet}</div><svg viewBox="0 0 164 116"><defs>`+
    `<linearGradient id="gMeals" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#b15cff"/><stop offset="1" stop-color="#ff5fa2"/></linearGradient>`+
    `<linearGradient id="gWater" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3c5"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>`+
    `<linearGradient id="gSali" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff8a3d"/><stop offset="1" stop-color="#ffd166"/></linearGradient>`+
    `<linearGradient id="gScore" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b15cff"/><stop offset="1" stop-color="#ff5fa2"/></linearGradient></defs>`+
    arc180(72,'url(#gMeals)',mpct)+arc180(56,'url(#gWater)',wpct)+arc180(40,'url(#gSali)',spct)+
    `<text x="82" y="80" text-anchor="middle" font-size="33" font-weight="800" fill="url(#gScore)">${score}</text>`+
    `<text x="82" y="98" text-anchor="middle" font-size="10.5" fill="#9b93b3">/ 100 pistettä</text>`+
    `</svg><div class="dleg">`+
    `<div><div class="dot" style="background:linear-gradient(135deg,#b15cff,#ff5fa2)"></div><div class="dn">Ruokailut</div><div class="dv">${mealsDone} / 5</div></div>`+
    `<div><div class="dot" style="background:linear-gradient(135deg,#22d3c5,#3b82f6)"></div><div class="dn">Vesi</div><div class="dv">${wlD} / ${wgD} l</div></div>`+
    `<div><div class="dot" style="background:linear-gradient(135deg,#ff8a3d,#ffd166)"></div><div class="dn">Treenit</div><div class="dv">${saliWithin(7)} / 3 vko</div></div>`+
    `</div><button class="dash-vs" onclick="showView('edist')">🔥 Katso kisatilanne</button></div>`;}
function renderRuoka(){
  const f=foodState(),p=state.person;let h=foodDashboard(f);
  const aDone=!!f.aamupala,lDone=mealDone(f.lounas),pDone=mealDone(f.paivallinen),vDone=!!(f.valipala.raejuusto||f.valipala.pahkina||f.valipala.rahka),iDone=!!(f.iltapala.leipa||f.iltapala.raejuusto||f.iltapala.rahka||f.iltapala.jogurtti);
  const FTIPS=['Proteiinia joka aterialle — nälkä pakenee ja lihas kiittää 💪','Proteiini ensin, somerullaus sitten 😉','Väriä lautaselle: puoli lautasta kasviksia 🥗','Vesi on halvin pre-workout 💧','Syö kuin urheilija, lepää kuin kuningas/kuningatar 👑','Palautuminen alkaa lautaselta — ei pizzalaatikosta (yleensä) 🍕😅','Hyvin syöty päivä on voitto. Pala kerrallaan 💞'];

  h+='<h2 class="sec" id="sec-aamupala">🌅 Aamupala — napauta nähdäksesi annoksen</h2>';
  h+='<div class="sqgrid">';BREAKFAST[p].forEach(o=>{h+=optBtn('a'+o.id,o.n,o.a,f.aamupala===o.id,`pickAamu(${o.id})`);});h+='</div>';
  ['lounas','paivallinen'].forEach(meal=>{const m=f[meal],tit=meal==='lounas'?'☀️ Lounas':'🌙 Päivällinen';
    h+=`<h2 class="sec" id="sec-${meal}">${tit} — koosta annos</h2><div class="card"><div class="typebar">${tbtn(meal,'lautas','Lautasmalli',m.tyyppi)}${tbtn(meal,'keitto','Keitto',m.tyyppi)}${tbtn(meal,'grilli','Grilli',m.tyyppi)}${tbtn(meal,'muu','Muu',m.tyyppi)}</div>`;

    else if(m.tyyppi==='keitto'){h+='<div class="chips" style="margin-top:12px">';SOUPS.forEach(x=>h+=chip(`setSel('${meal}','keitto','${x.k}')`,x.n,'',m.keitto===x.k));h+='</div><div class="hint">Keittopäivä merkitty. Lisää kasviksia / proteiinilisuke.</div>';}
    else if(m.tyyppi==='grilli'){h+='<div class="chips" style="margin-top:12px">';GRILL.forEach(x=>h+=chip(`setSel('${meal}','grill','${x.k}')`,x.n,x.a,m.grill===x.k));h+='</div><div class="hint">Grillipäivä: muiden aterioiden tärkkelys/lisätty rasva pienemmäksi.</div>';}
    else{h+='<div class="chips" style="margin-top:12px">';MUU[p].forEach(x=>h+=chip(`setSel('${meal}','muu','${x.k}')`,x.n,x.a||'',m.muu===x.k));h+='</div><div class="hint">Kohtuullinen annos + salaatti. Carbonara & Hese/Mäkki harvemmin; sushissa suosi lohta/kalaa + edamame.</div>';}
    h+='</div>';});
  h+='<h2 class="sec" id="sec-valipala">🍎 Välipala</h2>';

    : {raejuusto:'150 g + 1 appelsiini · maitokahvi / tee', pahkina:'~30 g · maitokahvi / tee', rahka:'175 g + banaani · maitokahvi / tee'};
  h+='<div class="hint">Voit halutessasi juoda myös maitokahvin tai teen.</div>';

function tbtn(m,k,l,c){return `<button class="${c===k?'on':''}" onclick="setType('${m}','${k}')">${l}</button>`;}
function chip(oc,n,s,sel){return `<div class="chip ${sel?'sel':''}" onclick="${oc}"><span>${n}</span>${s?`<small>${s}</small>`:''}</div>`;}
function tog(path,l,done,sub){return `<div class="tog ${done?'done':''}" onclick="tglField('${path}')"><div class="box">${done?'✓':''}</div><div class="lbl">${l}${sub?`<small>${sub}</small>`:''}</div></div>`;}
function optBtn(key,title,detail,sel,toggleCall){state.exp=state.exp||{};const open=!!state.exp[key];
  const hasDetail=detail&&detail.trim();
  return `<div class="optbtn ${sel?'sel':''}" onclick="${hasDetail?`toggleExp('${key}')`:`${toggleCall}`}"><div class="ob-top"><div class="ob-ttl">${title}</div><div class="ob-check ${sel?'on':''}" onclick="event.stopPropagation();${toggleCall}">${sel?'✓':''}</div></div>${hasDetail?(open?`<div class="ob-detail">${detail}</div>`:`<div class="ob-more">Katso annos ▾</div>`):''}</div>`;}
function toggleExp(k){state.exp=state.exp||{};state.exp[k]=!state.exp[k];renderRuoka();}
function pickAamu(id){const f=foodState();f.aamupala=f.aamupala===id?null:id;saveFood(f);renderRuoka();}
function setType(m,t){const f=foodState();f[m].tyyppi=t;saveFood(f);renderRuoka();}
function setSel(m,fl,v){const f=foodState();f[m][fl]=f[m][fl]===v?null:v;saveFood(f);renderRuoka();}
function tglSalad(m){const f=foodState();f[m].salaatti=!f[m].salaatti;saveFood(f);renderRuoka();}
function tglField(path){const f=foodState();const p=path.split('.');if(p.length===1)f[p[0]]=!f[p[0]];else f[p[0]][p[1]]=!f[p[0]][p[1]];saveFood(f);renderRuoka();}

/* RENDER TREENI (sali + lenkit) */
const LENKKI_TYPES=[{k:'Kävely',e:'🚶'},{k:'Juoksu',e:'🏃'},{k:'Polkujuoksu',e:'⛰️'},{k:'Luontopolku',e:'🌲'},{k:'Geokätköily',e:'🧭'},{k:'Muu fyysinen aktiviteetti',e:'🤸'}];
function trainGoalText(p){return store.get('trainGoal:'+p, p==='jo'?'Pepputreeni: tavoite +2,5 kg/viikko hip thrustiin & jalkaprässiin, kun toistot täyttyvät kivutta.':'Alavartalopainotteinen treeni — yläkroppa toipuu.');}
function editTrainGoal(){const v=prompt('Treenitavoite (näkyy joka treenikerralla):',trainGoalText(state.person));if(v!=null){store.set('trainGoal:'+state.person,v.trim());renderSali();}}
function renderSali(){
  let h=`<div class="traingoal"><span class="tg-icon">🎯</span><span class="tg-txt">${trainGoalText(state.person).replace(/</g,'&lt;')}</span><button class="tg-edit" onclick="editTrainGoal()" title="Muokkaa tavoitetta">✎</button></div>`;
  const SCHEER=['Painaa, painaa, jaksaa, jaksaa 💪🔥','Viimeinen toisto on se mistä lihas kasvaa 😤','Et lopeta kun väsyttää, vaan kun on valmista 🔥','Hiki on rasvan itkua 😅💦','Tänään et kadu sitä mitä teit — vain sen minkä jätit tekemättä 💪','Peppuprojekti etenee yksi toisto kerrallaan 🍑'];
  h+=`<div class="salicheer">${SCHEER[(new Date().getDate()+fiHour())%SCHEER.length]}</div>`;
  h+='<h3 class="sub">Salitreeni</h3><div class="amt" style="font-weight:800;color:var(--text);margin:0 3px 4px">Mikä treeni tänään?</div><div class="progbar">';
  [1,2,3].forEach(pr=>{h+=`<button class="${state.prog===pr?'on':''}" onclick="setProg(${pr})">${PROG_META[pr].e} ${PROG_META[pr].l}</button>`;});
  h+='</div>';
  exDefs().filter(e=>e.active).forEach(e=>{const cur=pendingWeight(e.id),mx=maxWeight(e.id),isPR=cur>mx&&cur>0;
    const unit=e.repsOnly?'toistoa':'kg',step=e.repsOnly?1:0.5;
    if(state.editing===e.id){
      h+=`<div class="exrow"><div class="edit-grid"><input id="edN" value="${e.n.replace(/"/g,'&quot;')}" placeholder="Liikkeen nimi"><div class="edit-row"><input id="edS" type="number" value="${e.sets}" placeholder="Sarjat"><input id="edR" value="${e.reps}" placeholder="Toistot esim. 10–12"></div><label style="display:flex;align-items:center;gap:9px;font-size:1.02rem;font-weight:600;margin:2px 1px"><input type="checkbox" id="edRO" ${e.repsOnly?'checked':''} style="width:20px;height:20px"> Vain toistot (ei painoa)</label><div class="row-btns"><button class="btn grad full" onclick="saveEdit('${e.id}')">Valmis</button><button class="btn danger" onclick="archiveEx('${e.id}')">Arkistoi</button></div></div></div>`;
    } else {
      h+=`<div class="exrow"><div class="ex-h"><div><div class="nm">${e.n}${e.repsOnly?' <span style="font-size:.8rem;color:var(--muted);font-weight:700">· toistot</span>':''}</div><div class="tg">${e.sets} × ${e.reps}</div></div>${isPR?'<span class="pr">★ PR</span>':''}<button class="icon-btn" onclick="startEdit('${e.id}')">✎</button></div><div class="stepper"><button onclick="adj('${e.id}',-${step})">−</button>${state.valEdit===e.id?`<input class="val-input" id="vi_${e.id}" type="number" inputmode="decimal" step="${step}" value="${cur}" onblur="commitVal('${e.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`:`<div class="val" onclick="editVal('${e.id}')" title="Napauta kirjoittaaksesi luvun">${String(cur).replace('.',',')} <small>${unit}</small></div>`}<button onclick="adj('${e.id}',${step})">+</button></div><div class="exchart" id="ec_${e.id}"></div></div>`;
    }
  });
  if(state.adding){h+=`<div class="exrow"><div class="edit-grid"><input id="adN" placeholder="Uuden liikkeen nimi"><div class="edit-row"><input id="adS" type="number" value="3" placeholder="Sarjat"><input id="adR" value="8" placeholder="Toistot"></div><label style="display:flex;align-items:center;gap:9px;font-size:1.02rem;font-weight:600;margin:2px 1px"><input type="checkbox" id="adRO" style="width:20px;height:20px"> Vain toistot (ei painoa)</label><div class="row-btns"><button class="btn grad full" onclick="addEx()">Lisää liike</button><button class="btn ghost" onclick="state.adding=false;renderSali()">Peruuta</button></div></div></div>`;}
  else h+=`<button class="btn ghost full" onclick="state.adding=true;renderSali()" style="margin-bottom:12px">＋ Lisää liike</button>`;
  h+=`<button class="save" onclick="saveSali()">Tallenna salitreeni</button><div class="savednote" id="saliNote"></div>`;
  const arch=exDefs().filter(e=>!e.active);
  h+=`<div class="archive-head" onclick="state.showArchive=!state.showArchive;renderSali()"><span>📦 Arkisto (${arch.length})</span><span>${state.showArchive?'▲':'▼'}</span></div>`;
  if(state.showArchive){if(!arch.length)h+=`<div class="amt" style="padding:9px 4px">Ei arkistoituja liikkeitä. Vaihtaessasi liikkeen vanha siirtyy tänne historioineen.</div>`;
    arch.forEach(e=>{h+=`<div class="arch-item"><div class="nm">${e.n}<br><span style="font-size:.92rem">${hist(e.id).length} merkintää tallessa</span></div><button class="btn grad" onclick="restoreEx('${e.id}')">Palauta</button></div>`;});}
  // LENKIT
  h+='<h3 class="sub">Lenkit / liikunta</h3><div class="lk"><div class="amt" style="font-weight:800;color:var(--text)">Tyyppi</div><div class="chips" id="lkTypes"></div><div class="row"><input id="lkMin" type="number" inputmode="numeric" placeholder="Kesto (min)"><input id="lkKm" type="number" inputmode="decimal" placeholder="km (valinn.)"></div><button class="btn grad full" style="margin-top:10px" onclick="addLenkki()">Kirjaa lenkki</button></div>';
  const allw=store.get('workouts:'+state.person,[]);
  const recent=allw.map((w,i)=>({w,i})).filter(o=>within(o.w.d,14)).reverse();
  if(recent.length){h+='<div class="amt" style="margin:8px 3px 8px;font-weight:800;color:var(--text)">Viimeaikaiset treenit — poista väärät ✕</div>';
    recent.forEach(o=>{const w=o.w;const em=w.type==='sali'?'🏋️':(LENKKI_TYPES.find(t=>t.k===w.label)||{e:'👟'}).e;const extra=(w.min?w.min+' min':'')+(w.km?(w.min?' · ':'')+w.km+' km':'');
      h+=`<div class="lenkki-item"><span class="em">${em}</span><span>${w.label}${w.type==='sali'?' · sali':''}</span><span class="r">${fmtShort(w.d)}${extra?' · '+extra:''}</span><button class="wdel" onclick="deleteWorkout(${o.i})" title="Poista">✕</button></div>`;});}
  document.getElementById('v-sali').innerHTML=h;
  // type chips
  let lc='';LENKKI_TYPES.forEach((t,i)=>lc+=`<div class="chip ${state._lk===t.k?'sel':''}" onclick="state._lk='${t.k}';renderSali()"><span>${t.e} ${t.k}</span></div>`);
  document.getElementById('lkTypes').innerHTML=lc;
  exDefs().filter(e=>e.active&&state.editing!==e.id).forEach(e=>{const hh=hist(e.id);lineChart('ec_'+e.id,{height:100,categories:hh.map((x,i)=>'#'+(i+1)),series:[{data:hh.map(x=>x.w)}]});});
  if(state.valEdit){const vi=document.getElementById('vi_'+state.valEdit);if(vi){vi.focus();if(vi.select)vi.select();}}
}
function setProg(pr){state.prog=pr;state.editing=null;state.adding=false;state.showArchive=false;renderSali();}
function adj(id,d){setPending(id,Math.max(0,Math.round((pendingWeight(id)+d)*10)/10));renderSali();}
function setExact(id){const e=exDefs().find(x=>x.id===id)||{};const v=prompt(e.repsOnly?'Montako toistoa?':'Aseta paino (kg):',pendingWeight(id));if(v!=null&&!isNaN(parseFloat(v.replace(',','.'))))setPending(id,Math.max(0,parseFloat(v.replace(',','.'))));renderSali();}
function startEdit(id){state.editing=id;renderSali();}
function saveEdit(id){const d=exDefs(),e=d.find(x=>x.id===id);e.n=document.getElementById('edN').value.trim()||e.n;e.sets=parseInt(document.getElementById('edS').value)||e.sets;e.reps=document.getElementById('edR').value.trim()||e.reps;const ro=document.getElementById('edRO');if(ro)e.repsOnly=ro.checked;setExDefs(d);state.editing=null;renderSali();}
function archiveEx(id){const d=exDefs();d.find(x=>x.id===id).active=false;setExDefs(d);state.editing=null;toast('Liike arkistoitu — historia tallessa');renderSali();}
function restoreEx(id){const d=exDefs();d.find(x=>x.id===id).active=true;setExDefs(d);toast('Liike palautettu historioineen');renderSali();}
function addEx(){const n=document.getElementById('adN').value.trim();if(!n){toast('Anna liikkeen nimi');return;}const ro=document.getElementById('adRO');const d=exDefs(),id='c'+Date.now();d.push({id,n,sets:parseInt(document.getElementById('adS').value)||3,reps:document.getElementById('adR').value.trim()||'8',active:true,repsOnly:!!(ro&&ro.checked)});setExDefs(d);setHist(id,[]);state.adding=false;renderSali();}
function logWorkout(type,label,extra){const w=store.get('workouts:'+state.person,[]);if(type==='sali'&&w.some(x=>x.d===state.date&&x.type==='sali'))return;w.push(Object.assign({d:state.date,type,label},extra||{}));store.set('workouts:'+state.person,w);}
function saveSali(){let prs=[];exDefs().filter(e=>e.active).forEach(e=>{const w=pendingWeight(e.id);if(w<=0)return;let h=hist(e.id);if(isDemoArr(h))h=[];const mx=h.length?Math.max(...h.map(x=>x.w)):0,i=h.findIndex(x=>x.d===state.date);if(i>=0)h[i].w=w;else h.push({d:state.date,w});setHist(e.id,h);if(w>mx&&mx>0){prs.push(e.n+' '+w+' '+(e.repsOnly?'toistoa':'kg'));const pl=store.get('prs:'+state.person,[]);pl.push({d:state.date,ex:e.n,w});store.set('prs:'+state.person,pl);}});
  logWorkout('sali',PROG_META[state.prog].l);const note=document.getElementById('saliNote');
  if(prs.length){celebrate('★ Uusi ennätys: '+prs[0]+(prs.length>1?` (+${prs.length-1})`:'')+'!',true);note.textContent='✓ Tallennettu — uusi ennätys!';}
  else{toast('💪 Salitreeni tallennettu!');note.textContent='✓ Tallennettu — synkkaa Sheetiin vaiheessa 2';}
  setTimeout(()=>{note.textContent='';},2400);checkGoals();renderSali();}
function addLenkki(){const type=state._lk;if(!type){toast('Valitse lenkin tyyppi');return;}const min=parseInt(document.getElementById('lkMin').value)||0;const km=parseFloat((document.getElementById('lkKm').value||'').replace(',','.'))||0;
  logWorkout('lenkki',type,{min,km:km||undefined});state._lk=null;checkGoals();celebrate('👟 '+type+' kirjattu!');renderSali();}
function fmtShort(dstr){const a=(dstr||'').split('-');return a.length===3?(a[2]+'.'+a[1]+'.'):dstr;}
function deleteWorkout(i){const w=store.get('workouts:'+state.person,[]);if(i<0||i>=w.length)return;const x=w[i];if(!confirm('Poistetaanko treeni: '+(x.label||'')+' ('+fmtShort(x.d)+')?'))return;w.splice(i,1);store.set('workouts:'+state.person,w);toast('Treeni poistettu');checkGoals();renderSali();}

/* VESI */
function waterGoal(){return state.person==='jo'?2000:2500;}
function waterToday(){return store.get('water:'+state.person+':'+state.date,0);}
function streakOf(p){let s=0;const g=p==='jo'?2000:2500;for(let i=0;i<90;i++){if(store.get('water:'+p+':'+dkey(i),0)>=g)s++;else if(i===0)continue;else break;}return s;}
function addWater(ml){const before=waterToday(),g=waterGoal();let v=Math.max(0,before+ml);store.set('water:'+state.person+':'+state.date,v);
  if(before<g&&v>=g){celebrate('💧 Vesitavoite täynnä!');checkDay();checkMilestones();}renderVesi();}
function checkMilestones(){const s=streakOf(state.person);const done=store.get('wms:'+state.person,[]);[3,7,14,30].forEach(m=>{if(s>=m&&!done.includes(m)){done.push(m);store.set('wms:'+state.person,done);celebrate('🔥 '+m+' päivän putki – mahtavaa, jatka samaan malliin!',true);}});checkGoals();}
function renderVesi(){
  const g=waterGoal(),v=waterToday(),pct=Math.min(100,Math.round(v/g*100)),streak=streakOf(state.person);
  let motiv=pct>=100?'💧 Tavoite täynnä – hienoa!':pct>=70?'Melkein perillä!':pct>=30?'Hyvää vauhtia, jatka!':'Hyvä alku – ota lasillinen.';
  const fillH=Math.min(100,v/g*100);
  document.getElementById('v-vesi').innerHTML=`<h2 class="sec">Veden juonti tänään</h2><div class="card"><div class="water-wrap">
    <svg class="bottle" viewBox="0 0 60 120"><defs><linearGradient id="wg" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="${p1()}"/><stop offset="1" stop-color="${p2()}"/></linearGradient></defs>
    <rect x="23" y="2" width="14" height="9" rx="2" fill="#3a3550"/><rect x="19" y="11" width="22" height="7" rx="3" fill="#46405f"/>
    <path d="M15 22 q0 -3 3 -3 h24 q3 0 3 3 v90 q0 5 -5 5 h-20 q-5 0 -5 -5 z" fill="#221d30" stroke="#46405f" stroke-width="1.4"/>
    <clipPath id="bc"><path d="M15 22 q0 -3 3 -3 h24 q3 0 3 3 v90 q0 5 -5 5 h-20 q-5 0 -5 -5 z"/></clipPath>
    <rect x="15" y="${22+95*(100-fillH)/100}" width="30" height="${95*fillH/100}" fill="url(#wg)" clip-path="url(#bc)"/></svg>
    <div class="water-info"><div class="big">${NUM(v)} <small>/ ${NUM(g)} l</small></div><div class="amt">${pct} % tavoitteesta</div><div class="motiv">${motiv}</div></div></div>
    <div class="water-btns"><button onclick="addWater(-250)">−</button><button class="plus" onclick="addWater(250)">+ 2 dl</button><button class="plus" onclick="addWater(500)">+ 5 dl</button></div></div>
    <div class="streak"><span class="fire">🔥</span><div><div class="s-n">${streak} pv</div><div class="s-t">putkeen tavoitteessa — seuraava etappi ${[3,7,14,30].find(m=>m>streak)||'30+'} pv</div></div></div>
    <div class="hint" style="margin-top:12px">Tavoite ${state.person==='jo'?'~2,0 l':'~2,5 l'}/pvä juotuna — osa nesteestä tulee lisäksi ruoasta.</div>`;
}

/* EDISTYMINEN */
function partnerCard(){
  const me=state.person,other=me==='jo'?'ra':'jo';
  function row(pp){const f=foodOf(pp);const fd=f.aamupala&&mealDone(f.lounas)&&mealDone(f.paivallinen);const w=store.get('water:'+pp+':'+state.date,0),g=pp==='jo'?2000:2500;
    return `<div class="pp-row"><span class="pp-name ${pp}">${nm(pp)}</span><span class="pp-stat">ruoat ${fd?'✅':'⏳'}</span><span class="pp-stat">vesi ${w>=g?'✅':NUM(w)+'/'+NUM(g)+' l'}</span></div>`;}
  const oF=foodOf(other),oFood=oF.aamupala&&mealDone(oF.lounas)&&mealDone(oF.paivallinen);
  const oW=store.get('water:'+other+':'+state.date,0),oWdone=oW>=(other==='jo'?2000:2500);
  let cheerHi='';const ach=oFood?'koko päivän ruoat':(oWdone?'vesitavoitteen':null);
  if(ach)cheerHi=`<div class="cheer-hi">🎉 ${nm(other)} saavutti ${ach} tänään!</div>`;
  return `<h2 class="sec">Yhdessä tänään</h2><div class="card">${row('jo')}${row('ra')}${cheerHi}<button class="btn grad full" style="margin-top:11px" onclick="cheer('${other}')">Lähetä kannustus käyttäjälle: ${nm(other)} 🔥</button></div>`;
}
function cheer(p){store.set('cheerFor:'+p,{from:state.person,t:Date.now()});celebrate('🔥 Kannustus lähetetty: '+nm(p)+'!');}
function checkCheer(){const p=state.person;const c=store.get('cheerFor:'+p,null);if(c&&c.t&&c.t>store.get('cheerSeen:'+p,0)){store.set('cheerSeen:'+p,c.t);celebrate('💗 '+nm(c.from)+' lähetti sinulle kannustuksen — sinä pystyt tähän! 🔥',true);}}
function weeklyCard(){
  const w=store.get('workouts:'+state.person,[]).filter(x=>within(x.d,7)).length;
  const pr=store.get('prs:'+state.person,[]).filter(x=>within(x.d,7)).length;
  let wd=0;for(let i=0;i<7;i++)if(store.get('water:'+state.person+':'+dkey(i),0)>=waterGoal())wd++;
  return `<h2 class="sec">Tämä viikko</h2><div class="etapit">
    <div class="badge"><div class="em">🏋️</div><div class="bn">${w}</div><div class="bt">treeniä</div></div>
    <div class="badge"><div class="em">⭐</div><div class="bn">${pr}</div><div class="bt">PR:ää</div></div>
    <div class="badge"><div class="em">💧</div><div class="bn">${wd}/7</div><div class="bt">vesipäivää</div></div></div>`;
}
function curWeek(){return Math.floor(Date.now()/(7*86400000));}
function workoutsWithin(n){return store.get('workouts:'+state.person,[]).filter(x=>within(x.d,n)).length;}
function saliWithin(n){return store.get('workouts:'+state.person,[]).filter(x=>x.type==='sali'&&within(x.d,n)).length;}
function lenkkiWithin(n){return store.get('workouts:'+state.person,[]).filter(x=>x.type==='lenkki'&&within(x.d,n)).length;}
function kmWithin(n){return Math.round(store.get('workouts:'+state.person,[]).filter(x=>x.type==='lenkki'&&within(x.d,n)).reduce((a,x)=>a+(x.km||0),0)*10)/10;}
function waterDays(n){let c=0;for(let i=0;i<n;i++)if(store.get('water:'+state.person+':'+dkey(i),0)>=waterGoal())c++;return c;}
function foodDays(n){let c=0;for(let i=0;i<n;i++)if(store.get('celebday:'+state.person+':'+dkey(i),false))c++;return c;}
function latestVal(key){const h=store.get(key+':'+state.person,[]);return h.length?h[h.length-1].w:null;}
function firstVal(key){const h=store.get(key+':'+state.person,[]);return h.length?h[0].w:null;}

const WEEK_METRICS=[
  {k:'liikunta',label:'Liikuntakerrat',unit:'krt/vko',cur:()=>workoutsWithin(7)},
  {k:'sali',label:'Salitreenit',unit:'krt/vko',cur:()=>saliWithin(7)},
  {k:'lenkit',label:'Lenkit',unit:'krt/vko',cur:()=>lenkkiWithin(7)},
  {k:'vesi',label:'Vesipäivät',unit:'pv/vko',cur:()=>waterDays(7)},
  {k:'ruoka',label:'Ruokapäivät',unit:'pv/vko',cur:()=>foodDays(7)},
  {k:'km',label:'Lenkkikilometrit',unit:'km/vko',cur:()=>kmWithin(7)}
];
const BIG_METRICS=[
  {k:'paino',label:'Paino',unit:'kg',dir:'down',cur:()=>latestVal('paino'),start:()=>firstVal('paino')},
  {k:'vyotaro',label:'Vyötärö',unit:'cm',dir:'down',cur:()=>latestVal('vyotaro'),start:()=>firstVal('vyotaro')},
  {k:'putki',label:'Vesiputki',unit:'pv',cur:()=>streakOf(state.person)},
  {k:'liike',label:'Liikkeen tulos',unit:'kg',needsEx:true,cur:(g)=>maxWeightByName(g&&g.exName),start:(g)=>firstWeightByName(g&&g.exName)}
];
function maxWeightByName(name){if(!name)return 0;let m=0;[1,2,3].forEach(pr=>{(store.get('exdef:'+state.person+':'+pr,[])).forEach(e=>{if(e.n===name){const w=maxWeight(e.id);if(w>m)m=w;}});});return m;}
function firstWeightByName(name){if(!name)return null;let vals=[];[1,2,3].forEach(pr=>{(store.get('exdef:'+state.person+':'+pr,[])).forEach(e=>{if(e.n===name){const h=hist(e.id);if(h.length)vals.push(h[0].w);}});});return vals.length?Math.min(...vals):null;}
function metricDef(scope,k){return (scope==='week'?WEEK_METRICS:BIG_METRICS).find(m=>m.k===k);}
function evalGoal(scope,g){const m=metricDef(scope,g.metric);if(!m)return null;const cur=m.cur(g);let reached,pct;
  const hasTarget=g.target>0; // tavoite katsotaan saavutetuksi vasta kun kelvollinen tavoiteluku on asetettu
  if(m.dir==='down'){const start=g.startVal!=null?g.startVal:(m.start?m.start(g):cur);reached=hasTarget&&cur!=null&&cur<=g.target;
    pct=(hasTarget&&start!=null&&start>g.target)?Math.max(0,Math.min(100,(start-cur)/(start-g.target)*100)):(reached?100:0);}
  else{reached=hasTarget&&cur>=g.target;pct=hasTarget?Math.max(0,Math.min(100,cur/g.target*100)):0;}
  return {m,cur,reached,pct:Math.round(pct)};}
function checkGoals(){['week','big'].forEach(scope=>{const key=(scope==='week'?'goalWeek:':'goalBig:')+state.person;let g=store.get(key,null);if(!g)return;
  if(scope==='week'){const cw=curWeek();if(g.weekKey!==cw){g.weekKey=cw;g.earned=false;store.set(key,g);}}
  const r=evalGoal(scope,g);if(r&&r.reached&&!g.earned){g.earned=true;store.set(key,g);celebrate('🎉 '+(scope==='week'?'Viikkotavoite':'Iso tavoite')+' saavutettu'+(g.reward?': '+g.reward+' 🎁':'!'),true);
    if(g.reward&&g.reward.trim()){const rl=store.get('rewards:'+state.person,[]);rl.push({id:'r'+Date.now()+Math.floor(Math.random()*1000),text:g.reward.trim(),scope,label:(scope==='week'?'Viikkotavoite':'Iso tavoite'),d:state.date,redeemed:false});store.set('rewards:'+state.person,rl);}
  }});if(typeof checkBadges==='function')checkBadges();}
function redeemReward(id){const rl=store.get('rewards:'+state.person,[]);const r=rl.find(x=>x.id===id);if(r){r.redeemed=true;r.redeemedD=state.date;store.set('rewards:'+state.person,rl);}toast('🎁 Palkinto lunastettu — nauttikaa!');renderPalkinnot();}
function unredeemReward(id){const rl=store.get('rewards:'+state.person,[]);const r=rl.find(x=>x.id===id);if(r){r.redeemed=false;store.set('rewards:'+state.person,rl);}renderPalkinnot();}
function renderPalkinnot(){
  const rl=store.get('rewards:'+state.person,[]);
  const waiting=rl.filter(x=>!x.redeemed),done=rl.filter(x=>x.redeemed);
  let h='<h2 class="sec">Lunastusta odottavat palkinnot</h2><div class="preview-tag">Olet ansainnut nämä saavuttamalla tavoitteesi. Täppää lunastetuksi, kun olet saanut sen — silloin se poistuu odotuslistalta.</div>';
  if(!waiting.length)h+='<div class="amt" style="padding:9px 3px">Ei vielä lunastettavia palkintoja. Aseta tavoitteelle palkinto Edistyminen-välilehdellä ja saavuta se! 🎁</div>';
  else waiting.forEach(r=>{h+=`<div class="rw earned"><div style="flex:1"><div style="font-weight:800;font-size:1.12rem">🎁 ${r.text}</div><div style="font-size:.92rem;color:var(--dim);margin-top:2px">${r.label} · ansaittu ${r.d}</div></div><button class="btn grad" onclick="redeemReward('${r.id}')">Lunastettu ✓</button></div>`;});

function goalEditor(scope){

  h+=`<div class="goal-inputs"><div class="gi"><label>Tavoite (${md?md.unit:''})</label><input type="number" inputmode="decimal" value="${g.target}" onchange="setGoalTarget('${scope}',this.value)"></div>

function setGoalTarget(scope,v){const g=gget(scope);g.target=parseFloat((v||'').replace(',','.'));if(isNaN(g.target))g.target=0;g.earned=false;gset(scope,g);renderEdist();checkGoals();}

/* ===== PIN-LUKITUS =====
   Turvallisuus: PIN-koodeja EI koskaan kirjoiteta koodiin. Käyttäjä asettaa PINin omalla
   laitteellaan ja se tallentuu vain selaimen localStorageen hashattuna (SHA-256 + suola).
   Näin julkinen GitHub-koodi ei sisällä PIN-koodeja eikä niitä voi lukea koodista.
   Tämä on yksityisyyssuoja (estää satunnaisen kurkkijan) — ei vahva tietoturva, koska
   selainpohjaisen sovelluksen data on laitteella luettavissa. Sovellus ei ota yhteyttä
   Googleen, Driveen eikä mihinkään palvelimeen — kaikki pysyy laitteella. */
function lkFnv(s){s='cg.salt.v1|'+s;let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return ('0000000'+h.toString(16)).slice(-8);}
async function hashPin(s){try{if(window.crypto&&crypto.subtle){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('cg.salt.v1|'+s));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}}catch(e){}return lkFnv(s);}
const lock={mode:null,buf:'',tmp:null,err:'',person:null,changing:false,recoPerson:null};
function lkHas(p){return !!store.get('pinHash:'+p,null);}
function anyPin(){return lkHas('jo')||lkHas('ra');}
function nm(p){return store.get('name:'+p,p==='jo'?'Profiili 1':'Profiili 2');}
function refreshNames(){const a=document.getElementById('whoJo'),b=document.getElementById('whoRa');if(a)a.textContent=nm('jo');if(b)b.textContent=nm('ra');}
/* WebAuthn / Face ID */
function waSupported(){return !!(window.PublicKeyCredential&&navigator.credentials&&navigator.credentials.create);}
function waHas(p){return !!store.get('wa:'+p,null);}
function waAny(){return waHas('jo')||waHas('ra');}
function b64e(buf){let s='';const b=new Uint8Array(buf);for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function enrollFace(p){if(!waSupported()){toast('Face ID ei ole käytettävissä tässä selaimessa');return;}
  try{const ch=crypto.getRandomValues(new Uint8Array(32)),uid=crypto.getRandomValues(new Uint8Array(16));
    const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:'CoupleGoals'},user:{id:uid,name:'cg-'+p,displayName:nm(p)},pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000,attestation:'none'}});
    store.set('wa:'+p,b64e(cred.rawId));toast('Face ID otettu käyttöön');renderSettings();
  }catch(e){toast('Face ID:n käyttöönotto peruttu');}}
function disableFace(p){store.set('wa:'+p,null);renderSettings();}
async function faceUnlock(){if(!waAny())return;
  try{const ch=crypto.getRandomValues(new Uint8Array(32)),allow=[];['jo','ra'].forEach(p=>{const id=store.get('wa:'+p,null);if(id)allow.push({type:'public-key',id:b64d(id)});});
    const as=await navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:allow,userVerification:'required',timeout:60000}});
    const got=b64e(as.rawId);let who=null;['jo','ra'].forEach(p=>{if(store.get('wa:'+p,null)===got)who=p;});lkUnlock(who||'jo');
  }catch(e){lock.err='Face ID epäonnistui — kokeile PINiä';renderLock();}}
/* LOCK */
function showLock(){if(!anyPin()){document.getElementById('lock').classList.add('hidden');return;}lock.buf='';lock.err='';lock.tmp=null;lock.changing=false;lock.person=null;lock.mode='enter';document.getElementById('lock').classList.remove('hidden');renderLock();}
function lockNow(){if(!anyPin()){toast('Aseta ensin PIN asetuksista (⚙️)');openSettings();return;}showLock();}
function lkUnlock(p){document.getElementById('lock').classList.add('hidden');lock.buf='';lock.err='';lock.changing=false;setPerson(p||'jo');}
function lkTap(d){if(lock.buf.length>=4)return;lock.buf+=String(d);lock.err='';renderLock();if(lock.buf.length===4)setTimeout(lkSubmit,130);}
function lkDel(){lock.buf=lock.buf.slice(0,-1);renderLock();}
async function lkSubmit(){
  if(lock.mode==='enter'){const h=await hashPin(lock.buf);let who=null;['jo','ra'].forEach(p=>{if(lkHas(p)&&store.get('pinHash:'+p,'')===h)who=p;});if(who)lkUnlock(who);else{lock.err='Väärä PIN';lock.buf='';renderLock();}}
  else if(lock.mode==='set1'){lock.tmp=lock.buf;lock.buf='';lock.mode='set2';lock.err='';renderLock();}
  else if(lock.mode==='set2'){if(lock.buf===lock.tmp){store.set('pinHash:'+lock.person,await hashPin(lock.buf));lock.buf='';if(!store.get('recoQ:'+lock.person,null)){lock.mode='recoSetup';renderLock();}else lkFinishSet();}else{lock.err='PIN-koodit eivät täsmää';lock.buf='';lock.tmp=null;lock.mode='set1';renderLock();}}
}
function lkFinishSet(){if(lock.changing){document.getElementById('lock').classList.add('hidden');lock.changing=false;refreshNames();openSettings();}else lkUnlock(lock.person);}
async function lkSaveReco(){const q=(document.getElementById('lkQ').value||'').trim(),a=(document.getElementById('lkA').value||'').trim();if(!q||!a){lock.err='Täytä sekä kysymys että vastaus';renderLock();return;}store.set('recoQ:'+lock.person,q);store.set('recoAHash:'+lock.person,await hashPin(a.toLowerCase()));lkFinishSet();}
function lkForgot(){const ps=['jo','ra'].filter(p=>store.get('recoQ:'+p,null));if(!ps.length){lock.err='Palautuskysymystä ei ole asetettu';renderLock();return;}lock.mode='forgot';lock.err='';renderLock();}
function lkForgotPick(p){lock.recoPerson=p;lock.mode='forgotA';lock.err='';renderLock();}
async function lkCheckReco(){const a=(document.getElementById('lkA').value||'').trim().toLowerCase();if((await hashPin(a))===store.get('recoAHash:'+lock.recoPerson,'')){lock.person=lock.recoPerson;lock.mode='set1';lock.buf='';lock.tmp=null;lock.changing=false;lock.err='Oikein! Aseta uusi PIN.';renderLock();}else{lock.err='Väärä vastaus';renderLock();}}
function lkBackEnter(){lock.mode='enter';lock.buf='';lock.err='';renderLock();}
function renderLock(){const L=document.getElementById('lock');document.body.className=lock.person||'jo';
  let inner='<div class="lk-icon">🎯</div><div class="lk-title">CoupleGoals</div><div class="lk-cg">Yhdessä kohti tavoitteita</div>';
  if(lock.mode==='recoSetup'){inner+=`<div class="lk-sub">Aseta palautuskysymys,<br>jolla saat uuden PINin jos unohdat sen.</div><div class="lk-form"><input id="lkQ" placeholder="Kysymys, esim. Ensimmäisen lemmikin nimi"><input id="lkA" placeholder="Vastaus"><button class="lk-btn" onclick="lkSaveReco()">Tallenna ja jatka</button></div><div class="lk-sub">${lock.err||''}</div>`;L.innerHTML=inner;return;}
  if(lock.mode==='forgot'){inner+='<div class="lk-sub">Valitse palautuskysymys</div><div class="lk-form">';['jo','ra'].forEach(p=>{const q=store.get('recoQ:'+p,null);if(q)inner+=`<button class="lk-btn" onclick="lkForgotPick('${p}')">${q.replace(/</g,'&lt;').replace(/"/g,'&quot;')}</button>`;});inner+='<button class="lk-link" onclick="lkBackEnter()">Takaisin</button></div>';L.innerHTML=inner;return;}
  if(lock.mode==='forgotA'){inner+=`<div class="lk-sub"><b>${(store.get('recoQ:'+lock.recoPerson,'')||'').replace(/</g,'&lt;')}</b></div><div class="lk-form"><input id="lkA" placeholder="Vastauksesi"><button class="lk-btn" onclick="lkCheckReco()">Vahvista</button><button class="lk-link" onclick="lkBackEnter()">Takaisin</button></div><div class="lk-sub">${lock.err||''}</div>`;L.innerHTML=inner;return;}
  const sub=lock.mode==='enter'?'Syötä PIN':lock.mode==='set1'?'Aseta uusi PIN':'Vahvista PIN uudelleen';
  inner+=`<div class="lk-sub">${lock.err||sub}</div>`;
  inner+=`<div class="lk-dots">${[0,1,2,3].map(i=>`<span class="${i<lock.buf.length?'f':''}"></span>`).join('')}</div>`;
  inner+='<div class="lk-pad">';[1,2,3,4,5,6,7,8,9].forEach(d=>inner+=`<button onclick="lkTap('${d}')"><span>${d}</span></button>`);
  inner+=`<button class="blank"></button><button onclick="lkTap('0')"><span>0</span></button><button onclick="lkDel()"><span>⌫</span></button></div>`;
  if(lock.mode==='enter'){if(waAny())inner+='<button class="lk-btn" style="max-width:330px;width:100%" onclick="faceUnlock()">😊 Avaa Face ID:llä</button>';inner+='<button class="lk-link" onclick="lkForgot()">Unohditko PINin?</button>';}
  L.innerHTML=inner;}
